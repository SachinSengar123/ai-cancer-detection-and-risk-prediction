     ============================================================ -->

<!-- Floating Button -->
<button class="float-chat-btn" id="floatChatBtn" onclick="toggleFloatChat()" title="Chat with AI Assistant">
    <span class="float-icon open-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
    </span>
    <span class="float-icon close-icon" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
    </span>
    <span class="float-badge" id="floatBadge">1</span>
</button>

<!-- Chat Popup -->
<div class="float-chat-popup" id="floatChatPopup">
    <!-- Header -->
    <div class="fcp-header">
        <div class="fcp-avatar">🤖</div>
        <div class="fcp-header-text">
            <span class="fcp-title">AI Health Assistant</span>
            <span class="fcp-status"><span class="fcp-dot"></span>Online</span>
        </div>
        <!-- Minimize button -->
        <button class="fcp-header-btn" id="fcpMinimizeBtn" onclick="minimizeFloatChat()" title="Minimize">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        </button>
        <!-- Open full page button -->
        <button class="fcp-header-btn" onclick="window.location.href='/chat'" title="Open full chat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
                <polyline points="15 3 21 3 21 9"></polyline>
                <polyline points="9 21 3 21 3 15"></polyline>
                <line x1="21" y1="3" x2="14" y2="10"></line>
                <line x1="3" y1="21" x2="10" y2="14"></line>
            </svg>
        </button>
        <!-- Close button -->
        <button class="fcp-header-btn" onclick="toggleFloatChat()" title="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
    </div>

    <!-- Messages -->
    <div class="fcp-messages" id="fcpMessages">
        <div class="fcp-welcome">
            <p>👋 Hi! I'm your <strong>Cancer Support Assistant</strong>.<br>How can I help you today?</p>
            <div class="fcp-quick-btns">
                <button onclick="fcpSendQuick(this)">Cancer symptoms?</button>
                <button onclick="fcpSendQuick(this)">Prevention tips</button>
                <button onclick="fcpSendQuick(this)">Healthy diet?</button>
            </div>
        </div>
    </div>

    <!-- Input -->
    <div class="fcp-input-area">
        <input type="text" id="fcpInput" placeholder="Type a message…" autocomplete="off">
        <button class="fcp-send-btn" id="fcpSendBtn" onclick="fcpSend()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>
</div>

<style>
/* ── Floating Button ── */
.float-chat-btn {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #1a6b8a, #2a9bc4);
    color: #fff;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(26,107,138,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: transform 0.2s, box-shadow 0.2s;
}
.float-chat-btn:hover {
    transform: scale(1.08) translateY(-2px);
    box-shadow: 0 10px 32px rgba(26,107,138,0.55);
}
.float-chat-btn:active { transform: scale(0.96); }

.float-icon svg { width: 26px; height: 26px; }

.float-badge {
    position: absolute;
    top: -2px; right: -2px;
    background: #ef4444;
    color: #fff;
    font-size: 0.68rem;
    font-weight: 700;
    width: 20px; height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid #fff;
    animation: badgePop 0.4s ease;
}

@keyframes badgePop {
    0%   { transform: scale(0); }
    70%  { transform: scale(1.2); }
    100% { transform: scale(1); }
}

/* ── Chat Popup ── */
.float-chat-popup {
    position: fixed;
    bottom: 102px;
    right: 28px;
    width: 360px;
    height: 480px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.18), 0 2px 8px rgba(26,107,138,0.12);
    display: none;
    flex-direction: column;
    overflow: hidden;
    z-index: 9998;
    border: 1px solid #e2e8f0;
    animation: popupOpen 0.3s cubic-bezier(0.34,1.56,0.64,1);
    transform-origin: bottom right;
}

.float-chat-popup.active {
    display: flex;
}

@keyframes popupOpen {
    from { opacity: 0; transform: scale(0.85) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
}

/* Header */
.fcp-header {
    background: linear-gradient(135deg, #1a6b8a, #2a9bc4);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
}

.fcp-avatar {
    width: 38px; height: 38px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
}

.fcp-header-text {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
}

.fcp-title {
    font-size: 0.9rem;
    font-weight: 600;
    color: #fff;
}

.fcp-status {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.8);
    display: flex;
    align-items: center;
    gap: 4px;
}

.fcp-dot {
    width: 7px; height: 7px;
    background: #00c9a7;
    border-radius: 50%;
    display: inline-block;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

.fcp-header-btn {
    background: rgba(255,255,255,0.15);
    border: none;
    border-radius: 8px;
    color: #fff;
    cursor: pointer;
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
}
.fcp-header-btn:hover { background: rgba(255,255,255,0.3); }

/* Minimized state */
.float-chat-popup.minimized .fcp-messages,
.float-chat-popup.minimized .fcp-input-area { display: none; }
.float-chat-popup.minimized { height: auto; border-radius: 16px; }

/* Messages */
.fcp-messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
    background: #f8fafc;
}

.fcp-messages::-webkit-scrollbar { width: 3px; }
.fcp-messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

.fcp-welcome {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    padding: 14px;
    font-size: 0.83rem;
    line-height: 1.6;
    color: #334155;
    animation: fadeUp 0.4s ease;
}

.fcp-quick-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
}

.fcp-quick-btns button {
    background: #f0f4f8;
    border: 1px solid #e2e8f0;
    border-radius: 20px;
    padding: 5px 10px;
    font-size: 0.75rem;
    color: #1a6b8a;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
}

.fcp-quick-btns button:hover {
    background: #1a6b8a;
    color: #fff;
    border-color: #1a6b8a;
}

/* Message rows */
.fcp-msg-row {
    display: flex;
    gap: 7px;
    align-items: flex-end;
    animation: fadeUp 0.25s ease;
}

.fcp-msg-row.user { flex-direction: row-reverse; }

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
}

.fcp-bubble {
    max-width: 78%;
    padding: 9px 13px;
    border-radius: 14px;
    font-size: 0.82rem;
    line-height: 1.6;
}

.fcp-bubble.bot {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-bottom-left-radius: 4px;
    color: #1e293b;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}

.fcp-bubble.user {
    background: linear-gradient(135deg, #1a6b8a, #2a9bc4);
    color: #fff;
    border-bottom-right-radius: 4px;
}

.fcp-bubble.error {
    background: #fff0f0;
    border-color: #fecaca;
    color: #dc2626;
}

/* Typing */
.fcp-typing {
    display: flex;
    gap: 4px;
    padding: 10px 14px;
    align-items: center;
}

.fcp-typing span {
    width: 6px; height: 6px;
    background: #94a3b8;
    border-radius: 50%;
    animation: fcpBounce 1.2s infinite;
}

.fcp-typing span:nth-child(2) { animation-delay: 0.2s; }
.fcp-typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes fcpBounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
}

/* Input */
.fcp-input-area {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-top: 1px solid #e2e8f0;
    background: #fff;
    flex-shrink: 0;
}

#fcpInput {
    flex: 1;
    border: 1.5px solid #e2e8f0;
    border-radius: 12px;
    padding: 8px 12px;
    font-size: 0.83rem;
    color: #1e293b;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s;
    background: #f8fafc;
}

#fcpInput:focus { border-color: #2a9bc4; background: #fff; }
#fcpInput::placeholder { color: #94a3b8; }

.fcp-send-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #1a6b8a, #2a9bc4);
    color: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s;
}
.fcp-send-btn:hover { transform: scale(1.08); }
.fcp-send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.fcp-send-btn svg { width: 15px; height: 15px; }
</style>

<script>
(function () {
    const popup   = document.getElementById('floatChatPopup');
    const btn     = document.getElementById('floatChatBtn');
    const badge   = document.getElementById('floatBadge');
    const openIcon = btn.querySelector('.open-icon');
    const closeIcon = btn.querySelector('.close-icon');
    let isOpen = false;

    window.toggleFloatChat = function () {
        isOpen = !isOpen;
        popup.classList.toggle('active', isOpen);
        // If opening while minimized, restore full size
        if (isOpen) popup.classList.remove('minimized');
        openIcon.style.display  = isOpen ? 'none' : 'flex';
        closeIcon.style.display = isOpen ? 'flex' : 'none';
        if (isOpen) {
            badge.style.display = 'none';
            document.getElementById('fcpInput').focus();
        }
    };

    window.minimizeFloatChat = function () {
        popup.classList.toggle('minimized');
        const isMin = popup.classList.contains('minimized');
        const minBtn = document.getElementById('fcpMinimizeBtn');
        // Change icon: minus ↔ restore (chevron up)
        minBtn.innerHTML = isMin
            ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><polyline points="18 15 12 9 6 15"></polyline></svg>`
            : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><line x1="5" y1="12" x2="19" y2="12"></line></svg>`;
    };

    window.fcpSendQuick = function (btnEl) {
        document.getElementById('fcpInput').value = btnEl.textContent;
        fcpSend();
    };

    window.fcpSend = async function () {
        const input   = document.getElementById('fcpInput');
        const sendBtn = document.getElementById('fcpSendBtn');
        const msgs    = document.getElementById('fcpMessages');
        const message = input.value.trim();
        if (!message) return;

        // Remove welcome if present
        const welcome = msgs.querySelector('.fcp-welcome');
        if (welcome) welcome.remove();

        // User bubble
        appendFcpMsg('user', message);
        input.value = '';
        sendBtn.disabled = true;

        // Typing indicator
        const typingRow = document.createElement('div');
        typingRow.className = 'fcp-msg-row bot';
        typingRow.id = 'fcp-typing';
        typingRow.innerHTML = `
            <div class="fcp-bubble bot" style="padding:10px 14px">
                <div class="fcp-typing"><span></span><span></span><span></span></div>
            </div>`;
        msgs.appendChild(typingRow);
        msgs.scrollTop = msgs.scrollHeight;

        try {
            const res  = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            });
            const data = await res.json();
            document.getElementById('fcp-typing')?.remove();

            if (!res.ok || !data.success) throw new Error(data.message || 'Error');
            appendFcpMsg('bot', data.message);
        } catch (err) {
            document.getElementById('fcp-typing')?.remove();
            appendFcpMsg('bot', '⚠️ ' + err.message, true);
        } finally {
            sendBtn.disabled = false;
            input.focus();
        }
    };

    function appendFcpMsg(role, text, isError = false) {
        const msgs = document.getElementById('fcpMessages');
        const row  = document.createElement('div');
        row.className = `fcp-msg-row ${role}`;

        const bubble = document.createElement('div');
        bubble.className = `fcp-bubble ${role}${isError ? ' error' : ''}`;
        bubble.innerHTML = text.replace(/\n/g, '<br>');

        row.appendChild(bubble);
        msgs.appendChild(row);
        msgs.scrollTop = msgs.scrollHeight;
    }

    // Enter key support
    document.getElementById('fcpInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); fcpSend(); }
    });
})();
</script>
